name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsecret-tools \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            rpm \
            wget

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundles
        run: npm run tauri -- build

      - name: Collect release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $bundleRoot = "src-tauri/target/release/bundle"
          $releaseDir = "release-assets"
          $platform = "${{ runner.os }}".ToLowerInvariant()
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null

          Get-ChildItem -Path $bundleRoot -Recurse -File |
            Where-Object { $_.Name -match '\.(msi|exe|deb|rpm|AppImage|dmg)$' -or $_.Name -match '\.(tar\.gz|tgz)$' } |
            ForEach-Object { Copy-Item -LiteralPath $_.FullName -Destination $releaseDir }

          Copy-Item -LiteralPath "$bundleRoot/SHA256SUMS.txt" -Destination "$releaseDir/SHA256SUMS-$platform.txt"

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish draft release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Write release notes
        run: |
          cat > release-notes.md <<'EOF'
          Unsigned beta build. Verify downloads with the SHA256SUMS files before installing.

          Windows users can choose the NSIS setup EXE or MSI package.
          Linux users should install the matching package for their distribution and ensure `secret-tool` is available for credential storage.
          EOF

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/* --clobber
          else
            gh release create "$TAG_NAME" release-assets/* \
              --draft \
              --title "FastDL Desktop $TAG_NAME" \
              --notes-file release-notes.md
          fi
